<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zzq - 前端开发者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0f0f1a;
      /* 深色渐变背景 */
      background: radial-gradient(ellipse at 30% 20%, #1a1a3e 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, #1e1035 0%, transparent 50%),
                  #0f0f1a;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px 40px;
      width: 380px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    }

    /* 头像 */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name {
      font-size: 26px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.5px;
    }

    .title {
      display: inline-block;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #a5b4fc;
      background: rgba(99, 102, 241, 0.15);
      padding: 4px 16px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .divider {
      width: 48px;
      height: 2px;
      margin: 24px auto;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 2px;
    }

    .bio {
      font-size: 15px;
      line-height: 1.7;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .skills {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .skill {
      font-size: 13px;
      font-weight: 500;
      padding: 6px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #cbd5e1;
      transition: all 0.25s ease;
    }

    .skill:hover {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.3);
      color: #e2e8f0;
      transform: translateY(-2px);
    }

    /* 页脚社交图标 */
    .footer {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .footer a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #64748b;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .footer a:hover {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      transform: translateY(-2px);
    }

    .footer svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">
      <img src="https://cdn.ldstatic.com/user_avatar/linux.do/zzq1/144/1665679_2.png" alt="zzq" />
    </div>
    <h1 class="name">zzq</h1>
    <span class="title">前端开发者</span>

    <p class="bio">

      专注于构建高性能、用户友好的 Web 应用，
      持续探索前沿技术。
    </p>
    <div class="skills">
      <span class="skill">React</span>
      <span class="skill">Python</span>
      <span class="skill">设计</span>
    </div>
    <div class="footer">

</body>
